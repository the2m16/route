<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UB Routing map</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.css" />

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }
  #app {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
  }
  #map {
    flex: 1;
    height: 100%;
    position: relative;
  }
  #panel {
    width: 320px;
    background: #1f2937;
    color: #f3f4f6;
    overflow-y: auto;
    flex-shrink: 0;
    box-shadow: -2px 0 8px rgba(0,0,0,0.25);
    position: absolute;
    top: 0;
    right: 0;
    height: 100%;
    z-index: 1100;
    max-width: 85vw;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  #panel.open {
    transform: translateX(0);
  }
  #panel-toggle {
    position: absolute;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    width: 25px;
    height: 60px;
    background: #16a34a;
    border: none;
    border-radius: 6px 0 0 6px;
    cursor: pointer;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: -2px 0 6px rgba(0,0,0,0.3);
    transition: right 0.25s ease;
  }
  #panel-toggle svg {
    width: 18px;
    height: 18px;
    fill: #ffffff;
    transition: transform 0.25s ease;
  }
  #panel.open ~ #panel-toggle svg {
    transform: rotate(180deg);
  }
  #panel h2 {
    margin: 0;
    padding: 16px;
    font-size: 0.8rem;
   font-weight: 300;
    background: #111827;
    border-bottom: 1px solid #374151;
  }
  #panel .hint {
    padding: 12px 16px;
    font-size: 0.8rem;
    color: #9ca3af;
    border-bottom: 1px solid #374151;
    line-height: 1.5;
  }
  #mode-selector {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-bottom: 1px solid #374151;
  }
  .mode-btn {
    flex: 1;
    padding: 8px 4px;
    background: #374151;
    color: #d1d5db;
    border: 1px solid #4b5563;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  .mode-btn:hover {
    background: #4b5563;
  }
  .mode-btn.active {
    background: #2563eb;
    border-color: #2563eb;
    color: #ffffff;
    font-weight: 600;
  }
  #bus-note {
    padding: 10px 16px;
    font-size: 12px;
    color: #fbbf24;
    background: rgba(251,191,36,0.08);
    border-bottom: 1px solid #374151;
    line-height: 1.5;
  }
  #routing-container {
    padding: 8px 12px;
  }
  .leaflet-routing-container {
    background: transparent !important;
    color: #f3f4f6 !important;
    box-shadow: none !important;
    border: none !important;
    padding: 0 !important;
    max-width: none !important;
  }
  .leaflet-routing-alt {
    background: #374151 !important;
    border-radius: 8px;
    margin-bottom: 10px;
    padding: 10px !important;
    max-height: none !important;
  }
  .leaflet-routing-alt table {
    color: #e5e7eb;
  }
  .leaflet-routing-alt h2 {
    font-size: 14px !important;
    color: #93c5fd !important;
    padding: 0 !important;
    background: transparent !important;
    margin-bottom: 4px;
  }
  .leaflet-routing-alt h3 {
    font-size: 13px !important;
    color: #d1d5db !important;
    font-weight: normal;
  }
  .leaflet-routing-geocoders input {
    background: #374151;
    color: #f3f4f6;
    border: 1px solid #4b5563;
    border-radius: 4px;
    padding: 6px;
    width: 100%;
    margin-bottom: 6px;
  }
  .leaflet-routing-geocoders td {
    padding: 4px 0;
  }
  .leaflet-routing-icon {
    filter: invert(1) brightness(1.5);
  }
  #clear-btn {
    margin: 4px 12px 12px 12px;
    padding: 10px;
    width: calc(100% - 24px);
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  #clear-btn:hover {
    background: #dc2626;
  }
  #locate-btn {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    background: #ffffff;
    border: none;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    transition: right 0.25s ease, background 0.15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  #app.panel-open #locate-btn {
    right: 344px;
  }
  @media (max-width: 600px) {
    #app.panel-open #locate-btn {
      right: calc(85vw + 24px);
    }
  }
  #locate-btn:focus {
    outline: none;
  }
  #locate-btn:hover {
    background: #f1f1f1;
  }
  #locate-btn svg {
    width: 22px;
    height: 22px;
    fill: #4285F4;
  }
  #locate-btn.active svg {
    fill: #0099ff;
  }
  .pulse-marker-wrapper {
    background: transparent !important;
    border: none !important;
  }
  .pulse-marker {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4285F4;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 rgba(66,133,244,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(66,133,244,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(66,133,244,0); }
    100% { box-shadow: 0 0 0 0 rgba(66,133,244,0); }
  }

 .map-copyright {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    
    font-family: Arial, sans-serif;
    font-size: 0.7rem;
    color: #999999;
    background-color: rgba(26, 26, 26, 0.0);
    padding: 3px 8px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
}
 
</style>
</head>
<body>

<div id="app">
  <div id="map">
    <button id="locate-btn" title="Миний байршил">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </button>
  </div>
<div class="map-copyright">UB Routing &copy; 2026 The2m16</div>
  <div id="panel">
    <h2>МАРШРУТ ЗОХИОХ</h2>
    <div class="hint">
      Газрын зурагт А, В цэгүүдээ хатгаж зорчих хэлбэрээ сонгоно уу. Цэгүүдийн байршлаас маршрут шууд хамаарах учир нарийвчлан зааж хатгана уу. Хатгасан цэгээ чирж байршлыг залруулж болно. Дараалуулан нэмж цэг хатгаж болно.
    </div>
    <div id="mode-selector">
     <button class="mode-btn active" data-mode="car">🚘 Машин</button>
     <button class="mode-btn" data-mode="foot">🚶 Явган</button>
     <!-- 🚍 https://www.aivosto.com/fontitin/reports/font-segoe-ui-emoji.html -->
    </div>
    <div id="routing-container"></div>
    <button id="clear-btn">Маршрутыг арилгах</button>
  </div>
  <button id="panel-toggle" title="Менюг нээх/хаах">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>

<script>
  // Улаанбаатарын төв цэг
  const UB_CENTER = [47.908296, 106.925875];

  const map = L.map('map', {zoomControl: false, attributionControl: false}).setView(UB_CENTER, 15);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    subdomains: 'abcd',
  }).addTo(map);

  // Routing engines per mode.
  // OSRM public demo server only reliably serves the "driving" profile.
  // For foot routing we use the OSRM FOSSGIS instance, which supports foot/bike/car.
  const ROUTERS = {
    car: L.Routing.osrmv1({
      serviceUrl: 'https://router.project-osrm.org/route/v1',
      profile: 'driving'
    }),
    foot: L.Routing.osrmv1({
      serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1',
      profile: 'foot'
    })
  };

  let currentMode = 'car';

  // Routing control
  const routingControl = L.Routing.control({
    waypoints: [],
    routeWhileDragging: true,
    show: true,
    addWaypoints: true,
    draggableWaypoints: true,
    fitSelectedRoutes: false,
    collapsible: false,
    language: 'en',
    router: ROUTERS[currentMode],
    createMarker: function(i, wp, n) {
      const label = i === 0 ? 'Эхлэл' : (i === n - 1 ? 'Төгсгөл' : 'Цэг ' + (i + 1));
      return L.marker(wp.latLng, {
        draggable: true,
        title: label
      }).bindPopup(label);
    }
  }).addTo(map);

  // Move routing panel into our sidebar container
  const routingContainer = routingControl.getContainer();
  document.getElementById('routing-container').appendChild(routingContainer);

  // Switch transport mode
  function setMode(mode) {
    currentMode = mode;

    document.querySelectorAll('.mode-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });

  // Swap the underlying router used by the control
    routingControl.options.router = ROUTERS[mode];
    routingControl._router = ROUTERS[mode];

    const waypoints = routingControl.getWaypoints();
    if (waypoints.filter(wp => wp.latLng).length >= 2) {
      routingControl.route();
    }
  }

  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setMode(btn.dataset.mode);
    });
  });

  // ---- Panel collapse/expand toggle ----
  const appEl = document.getElementById('app');
  const panel = document.getElementById('panel');
  const panelToggle = document.getElementById('panel-toggle');
  L.DomEvent.disableClickPropagation(panel);
  L.DomEvent.disableClickPropagation(panelToggle);
  L.DomEvent.disableScrollPropagation(panel);

  function updateToggleOffset() {
    if (panel.classList.contains('open')) {
      const w = panel.getBoundingClientRect().width;
      panelToggle.style.right = w + 'px';
    } else {
      panelToggle.style.right = '0px';
    }
  }

  panelToggle.addEventListener('click', function() {
    panel.classList.toggle('open');
    appEl.classList.toggle('panel-open');
    updateToggleOffset();
  });

  window.addEventListener('resize', updateToggleOffset);

  // Add waypoints with left mouse click
  map.on('click', function(e) {
    const waypoints = routingControl.getWaypoints();
    const emptyIndex = waypoints.findIndex(wp => !wp.latLng);

    if (emptyIndex !== -1) {
  // Fill the first empty waypoint slot
      routingControl.spliceWaypoints(emptyIndex, 1, e.latlng);
    } else {
      // Add a new waypoint at the end
      routingControl.spliceWaypoints(waypoints.length, 0, e.latlng);
    }
  });

  // Clear route button
  document.getElementById('clear-btn').addEventListener('click', function() {
    routingControl.setWaypoints([]);
  });

  // Locate (current location) button
  let userMarker = null;

  const locateBtn = document.getElementById('locate-btn');
  L.DomEvent.disableClickPropagation(locateBtn);
  L.DomEvent.disableScrollPropagation(locateBtn);

  locateBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();

    if (!navigator.geolocation) {
      alert('Энэ хөтөч байршил тогтоохыг дэмжихгүй байна.');
      return;
    }

    locateBtn.classList.add('active');

    navigator.geolocation.getCurrentPosition(function(pos) {
      const latlng = [pos.coords.latitude, pos.coords.longitude];

      if (userMarker) {
        map.removeLayer(userMarker);
      }

      const icon = L.divIcon({
        className: 'pulse-marker-wrapper',
        html: '<div class="pulse-marker"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      userMarker = L.marker(latlng, { icon: icon }).addTo(map);

      map.setView(latlng, 17);
    }, function(err) {
      alert('Байршил тогтоох амжилтгүй боллоо: ' + err.message);
    }, {
      enableHighAccuracy: true,
      timeout: 10000
    });

    setTimeout(() => locateBtn.classList.remove('active'), 1000);
  });
</script>

</body>
</html>
